<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Streak Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* THEME */
:root{
  --bg:#0f172a;
  --panel:#020617;
  --primary:#3b82f6;
  --success:#22c55e;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

/* RESET */
*{box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  margin:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
}

/* LOGIN BAR */
.login-bar{
  text-align:center;
  padding:20px;
}

.login-bar button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* HEADER */
header{
  background:#020617;
  padding:15px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}

/* LAYOUT */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:#020617;
  padding:20px;
  border-radius:15px;
  border:1px solid #1e293b;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat{
  background:#020617;
  padding:10px;
  text-align:center;
  border-radius:10px;
  border:1px solid #1e293b;
}

.stat h3{color:#3b82f6;margin:0;}

/* FORM */
.field{margin-bottom:10px;}
input,textarea,select{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#020617;
  color:white;
}

button.submit{
  width:100%;
  padding:12px;
  background:#3b82f6;
  border:none;
  border-radius:10px;
  color:white;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
td,th{padding:8px;text-align:center;border-bottom:1px solid #1e293b;}

.rank1{background:#fde68a;color:black}
.rank2{background:#e5e7eb;color:black}
.rank3{background:#fed7aa;color:black}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-bar">
  <button onclick="loginDiscord()">🔐 Login with Discord</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
  <h2>⚡ Daily Streak Dashboard</h2>
</header>

<div class="container">

<!-- DASHBOARD -->
<div class="card">

<h3>📊 My Dashboard</h3>

<div class="stats">
  <div class="stat"><h3 id="dName">-</h3><span>Name</span></div>
  <div class="stat"><h3 id="dXP">0</h3><span>XP</span></div>
  <div class="stat"><h3 id="dStreak">0</h3><span>Streak</span></div>
  <div class="stat"><h3 id="dRank">-</h3><span>Rank</span></div>
</div>

</div>

<!-- FORM -->
<div class="card">

<h3>✍️ Submit Work</h3>

<div class="field">
<label>Discord</label>
<input id="discord" disabled>
</div>

<div class="field">
<label>Name</label>
<input id="name">
</div>

<div class="field">
<label>Subject</label>
<select id="subject">
<option value="">Select</option>
<option>Math</option>
<option>Physics</option>
<option>Other</option>
</select>
</div>

<div class="field">
<label>Topic</label>
<input id="topic">
</div>

<div class="field">
<label>Work</label>
<textarea id="work"></textarea>
</div>

<button class="submit" onclick="submitData()">Submit</button>

<p id="msg"></p>

</div>

<!-- LEADERBOARD -->
<div class="card" style="grid-column:1/3">

<h3>🏆 Leaderboard</h3>
<table id="board"></table>

</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwaZN3uo-CVGI59m7cTnRfGtlP8Jvp5LXTx54f4vEZ2_3RoOleP2w4JYfyYA7h3qKuM/exec";

/* LOGIN */
function loginDiscord(){
  window.location.href = "http://localhost:3000/login";
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* GET USER FROM REDIRECT */
function getUser(){
  const params = new URLSearchParams(window.location.search);
  const discord = params.get("discord");

  if(discord){
    localStorage.setItem("discord", discord);
  }
}

/* CHECK LOGIN */
function checkLogin(){
  const d = localStorage.getItem("discord");

  if(d){
    document.getElementById("app").style.display="block";
    document.getElementById("discord").value=d;
  }
}

/* SUBMIT */
function submitData(){

  const discord = localStorage.getItem("discord");
  const name = document.getElementById("name").value;

  if(!name){
    msg.innerText="Enter name";
    return;
  }

  fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      discord,
      name,
      subject:document.getElementById("subject").value,
      topic:document.getElementById("topic").value,
      work:document.getElementById("work").value
    })
  });

  msg.innerText="Submitted!";
  loadBoard();
}

/* LOAD BOARD */
function loadBoard(){

  const my = localStorage.getItem("discord");

  fetch(API)
  .then(r=>r.json())
  .then(data=>{

    board.innerHTML=`
<tr><th>#</th><th>Name</th><th>XP</th><th>Streak</th></tr>`;

    data.forEach((u,i)=>{

      board.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${u.name}</td>
<td>${u.totalXP}</td>
<td>${u.streak}</td>
</tr>`;

      if(u.discord === my){
        dName.innerText=u.name;
        dXP.innerText=u.totalXP;
        dStreak.innerText=u.streak;
        dRank.innerText=i+1;
      }

    });

  });

}

/* INIT */
getUser();
checkLogin();
loadBoard();

</script>

</body>
</html>
